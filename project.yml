name: DrawBit
options:
  bundleIdPrefix: com.iamilias
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: ""
    ENABLE_USER_SCRIPT_SANDBOXING: "NO"
targets:
  DrawBit:
    type: application
    platform: iOS
    sources:
      - path: DrawBit
    info:
      path: DrawBit/Info.plist
      properties:
        CFBundleDisplayName: DrawBit
        CFBundleIconName: AppIcon
        UIRequiresFullScreen: false
        UILaunchScreen:
          UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
          UISceneConfigurations: {}
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
          - UIInterfaceOrientationPortraitUpsideDown
        UIAppFonts:
          - PressStart2P-Regular.ttf
          - VT323-Regular.ttf
        # No UIBackgroundModes: DrawBit FM plays only while the app is in the
        # foreground. Declaring the "audio" background mode without persistent
        # background playback trips App Review guideline 2.5.4, so it's omitted.
        NSPhotoLibraryAddUsageDescription: DrawBit needs permission to save your exported PNG to Photos.
        # The app has no networking and uses no non-exempt encryption, so declare export
        # compliance up front — otherwise App Store Connect flags every build "Missing Compliance".
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        PRODUCT_BUNDLE_IDENTIFIER: com.iamilias.drawbit
  DrawBitTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: DrawBitTests
    dependencies:
      - target: DrawBit
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "2"
        GENERATE_INFOPLIST_FILE: "YES"
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/DrawBit.app/DrawBit"
  DrawBitUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: DrawBitUITests
    dependencies:
      - target: DrawBit
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "2"
        GENERATE_INFOPLIST_FILE: "YES"
        TEST_TARGET_NAME: DrawBit
